# ========== PROFIL PRODUCTION ==========

# Base H2 fichier production
spring.datasource.url=jdbc:h2:file:./data/healthcenter;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Console H2 désactivée en production (sécurité)
spring.h2.console.enabled=false

# ========== JPA/HIBERNATE ==========
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Premier démarrage : update pour créer les tables
# Après le premier démarrage, changer en "validate" pour la sécurité
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ========== LOGGING ==========
logging.level.com.healthcenter=INFO
logging.level.org.springframework=WARN

# ========== BACKUP AUTOMATIQUE ==========
backup.enabled=true
backup.directory=./backups
backup.cron=0 0 2 * * ?
