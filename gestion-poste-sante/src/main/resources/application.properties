
# ========== POSTGRESQL CONFIG ==========
spring.datasource.url=jdbc:postgresql://localhost:5433/healthcenter_db
spring.datasource.username=postgres
spring.datasource.password=1234

# Driver (auto-détecté, mais explicite = mieux)
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== JPA/HIBERNATE CONFIG ==========
# Dialecte SQL (optimisations spécifiques Postgres)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# DDL auto (gestion schéma)
# - create : DROP + CREATE tables à chaque démarrage (DEV uniquement)
# - update : Modifie le schéma si nécessaire (SAFE pour dev)
# - validate : Vérifie cohérence sans modifier (PROD)
spring.jpa.hibernate.ddl-auto=update

# Affiche le SQL généré dans les logs (utile pour apprendre)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========== LOGGING ==========
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

