spring.application.name=HealthCenter

# Profil actif (dev par défaut, prod pour production)
spring.profiles.active=dev

# ========== LOGGING ==========
logging.level.com.healthcenter=INFO
logging.file.name=logs/healthcenter.log
logging.file.max-size=10MB
logging.file.max-history=30

# ========== SCHEDULING (pour backups auto) ==========
spring.task.scheduling.pool.size=2
